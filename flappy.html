<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Flappy Bird · 飞扬的小鸟</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f1a2e;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden;touch-action:none;-webkit-user-select:none;user-select:none}
.gw{background:#1a2a4a;padding:16px;border-radius:16px;box-shadow:0 16px 48px rgba(0,0,0,.6)}
#c{display:block;border-radius:10px;width:400px;height:600px;cursor:pointer}
@media(max-width:440px){
  body{align-items:flex-start;padding-top:8px}
  .gw{padding:8px;border-radius:10px}
  #c{width:calc(100vw - 20px);height:auto;aspect-ratio:400/600}
}
</style>
</head>
<body><div class="gw"><canvas id="c" width="400" height="600"></canvas></div>
<script>
(function(){
  "use strict";
  var c = document.getElementById("c");
  var dpr = window.devicePixelRatio || 1;
  var W = 400, H = 600;
  if (dpr > 1) { c.width = W*dpr; c.height = H*dpr; c.style.width = "400px"; c.style.height = "600px"; }
  else { c.width = W; c.height = H; }
  var cx = c.getContext("2d");
  if (dpr > 1) cx.scale(dpr, dpr);

  var BR = 12, FH = 80, PW = 52, MG = 50; // MG = 最小缝隙

  var DIFFS = {
    easy:   { label:"简单", gap:180, speed:0.6, grav:0.06, jump:-3.0, spawn:320 },
    medium: { label:"普通", gap:155, speed:0.8, grav:0.08, jump:-3.4, spawn:280 },
    hard:   { label:"困难", gap:130, speed:1.0, grav:0.10, jump:-3.8, spawn:240 }
  };
  var THEMES = {
    sky:    { name:"晴天", a:"#4dc9f6", b:"#c1e8ff", pb:"#73bf2e", pd:"#4a8a1a", pl:"#8ed44a", g:"#ded895", gl:"#b89a40", gs:"#a08030" },
    night:  { name:"夜晚", a:"#0b1a3a", b:"#1a2a5a", pb:"#3a7a3a", pd:"#2a5a2a", pl:"#4a9a4a", g:"#2a3a2a", gl:"#1a2a1a", gs:"#3a4a3a" },
    sunset: { name:"黄昏", a:"#e85d3a", b:"#f5a842", pb:"#6a8a3a", pd:"#4a6a2a", pl:"#8aaa4a", g:"#c4a070", gl:"#a08050", gs:"#b09060" },
    forest: { name:"森林", a:"#2a6a3a", b:"#5a9a5a", pb:"#4a9a3a", pd:"#2a6a2a", pl:"#6aba4a", g:"#4a7a3a", gl:"#2a5a2a", gs:"#3a6a2a" }
  };
  var ITEMS = [
    { id:"shield",    name:"护盾",    desc:"触发后5秒无敌",        cost:5,   icon:"🛡", apply:function(g){g.active.shield=true;} },
    { id:"slowmo",    name:"慢动作",   desc:"减速一半持续5秒",     cost:10,  icon:"⏱", apply:function(g){g.active.slowmo=true;g.active.slowmoT=300;} },
    { id:"double",    name:"双倍得分", desc:"每根管道+2分",        cost:20,  icon:"×2", apply:function(g){g.active.double=true;} },
    { id:"ghost",     name:"幽灵",    desc:"穿透一次任意障碍",     cost:80,  icon:"👻", apply:function(g){g.active.ghost=true;} },
    { id:"superjump", name:"超级跳跃", desc:"跳更高落更慢",        cost:160, icon:"🚀", apply:function(g){g.active.superjump=true;} }
  ];
  var ML = [5,10,20,40,80,160];

  function save(d){ try{localStorage.setItem("fd7",JSON.stringify(d));}catch(e){} }
  function load(){
    try{var d=JSON.parse(localStorage.getItem("fd7"));if(d&&typeof d.total=="number")return d;}catch(e){}
    return{total:0,unlocks:[]};
  }

  // 特效队列
  var FX = [];
  function addFX(text,x,y,color,size) {
    FX.push({ text:text, x:x, y:y, color:color||"#fff", size:size||18, life:60 });
  }

  var G;
  function resetGame() {
    var d = DIFFS[G.diff];
    G.bird = { x:80, y:H/2, vy:0, rot:0 };
    G.pipes = []; G.score = 0; G.frame = 0; G.active = {}; G.held = false;
    G.grav = d.grav; G.jump = d.jump; G.gap = d.gap; G.pspeed = d.speed;
    G.nextPipe = 80; G.pendingWide = 0;
    FX = [];
    G.selItems.forEach(function(id){
      var it = ITEMS.find(function(i){return i.id===id});
      if (it && it.apply) it.apply(G);
    });
    if (G.selItems.length > 0) {
      var names = G.selItems.map(function(id){
        var it=ITEMS.find(function(i){return i.id===id});
        return it?it.icon+" "+it.name:"";
      }).join("  ");
      addFX("已装备: "+names, W/2, 80, "#4dc9f6", 14);
    }
  }
  function init() {
    var data = load();
    G = { screen:"menu", diff:"medium", theme:"sky", selItems:[],
      unlocks:data.unlocks||[], total:data.total||0, menuPage:"main" };
    resetGame();
  }

  // ---- 管道生成 ----
  function spawnPipe() {
    var minT = 80, maxT = H - FH - G.gap - 80;
    var topH = minT + Math.random() * (maxT - minT);
    var gap = G.gap;
    var pipe = { x:W, top:topH, bottom:topH+gap, scored:false, gapOverride:0 };

    var type = 'normal';
    if (G.pendingWide > 0) {
      var isWide = (G.pendingWide === 1);
      G.pendingWide--;
      type = isWide ? 'wide' : 'normal';
    } else {
      var r = Math.random();
      if (r < 0.10) type = 'moving';
      else if (r < 0.40) { type = 'wide'; G.pendingWide = 2; }
    }

    if (type === 'moving') {
      pipe.moving = true;
      pipe.moveDir = Math.random() < 0.5 ? 1 : -1;
      pipe.moveSpeed = Math.max(0.2, Math.abs(G.bird.vy) * 0.5);
      pipe.moveSide = Math.random() < 0.5 ? 'top' : 'bot';
      pipe.topFixed = topH;
      pipe.botFixed = topH + gap;
    }
    if (type === 'wide') {
      gap = G.gap * 2;
      var maxTW = H - FH - gap - 80;
      if (maxTW > minT) pipe.top = minT + Math.random() * (maxTW - minT);
      pipe.gapOverride = gap;
      pipe.bottom = pipe.top + gap;
    }
    // 普通/宽距管道的 bottom 跟随 top
    if (!pipe.moving) pipe.bottom = pipe.top + (pipe.gapOverride||G.gap);

    G.pipes.push(pipe);
  }

  // ---- 物理更新 ----
  function update() {
    if (G.screen !== "play") return;
    G.frame++;

    // 无敌计时
    if (G.active.invincible) { G.active.invincibleT--; if (G.active.invincibleT <= 0) G.active.invincible = false; }

    // 超级跳跃
    var eg = G.active.superjump ? G.grav * 0.5 : G.grav;
    var ej = G.active.superjump ? G.jump * 1.6 : G.jump;
    if (G.held) G.bird.vy = ej;
    G.bird.vy += eg; G.bird.y += G.bird.vy;
    G.bird.rot = Math.max(-30, Math.min(90, G.bird.vy * 6));

    var sm = G.active.slowmo ? 0.5 : 1;
    if (G.active.slowmo) { G.active.slowmoT--; if (G.active.slowmoT <= 0) G.active.slowmo = false; }

    G.nextPipe -= sm;
    if (G.nextPipe <= 0) { spawnPipe(); G.nextPipe = Math.round(DIFFS[G.diff].spawn / sm); }

    for (var i = G.pipes.length - 1; i >= 0; i--) {
      var p = G.pipes[i];
      p.x -= G.pspeed * sm;

      // 移动管道：仅一侧移动
      if (p.moving) {
        if (p.moveSide === 'top') {
          p.top += p.moveDir * p.moveSpeed * sm;
          if (p.top < 20) { p.top = 20; p.moveDir *= -1; }
          if (p.top > p.botFixed - MG) { p.top = p.botFixed - MG; p.moveDir *= -1; }
        } else { // bot moves
          p.bottom += p.moveDir * p.moveSpeed * sm;
          if (p.bottom > H - FH - 20) { p.bottom = H - FH - 20; p.moveDir *= -1; }
          if (p.bottom < p.topFixed + MG) { p.bottom = p.topFixed + MG; p.moveDir *= -1; }
        }
      }

      if (!p.scored && p.x + PW < G.bird.x - BR) {
        p.scored = true;
        G.score += G.active.double ? 2 : 1;
        if (G.active.double) addFX("+2", G.bird.x+20, G.bird.y-10, "#ffd700", 16);
      }
      if (p.x + PW < 0) G.pipes.splice(i, 1);
    }

    // 碰撞检测（无敌时忽略）
    var b = G.bird, hit = false;
    if (!G.active.invincible) {
      if (b.y + BR > H - FH || b.y - BR < 0) hit = true;
      for (var j = 0; j < G.pipes.length; j++) {
        var p = G.pipes[j];
        var pt = p.moving ? p.top : (p.gapOverride ? p.top : p.top);
        var pb = p.moving ? p.bottom : (p.gapOverride ? p.top + p.gapOverride : p.top + G.gap);
        if (b.x + BR > p.x && b.x - BR < p.x + PW) {
          if (b.y - BR < pt || b.y + BR > pb) { hit = true; break; }
        }
      }
    }

    if (hit) {
      if (G.active.ghost) {
        G.active.ghost = false;
        addFX("👻 幽灵穿透!", W/2, H/2-40, "#aaf", 20);
        b.y = Math.max(BR, Math.min(H-FH-BR, b.y)); b.vy = 0;
      } else if (G.active.shield) {
        G.active.shield = false;
        G.active.invincible = true;
        G.active.invincibleT = 300; // 5秒
        addFX("🛡 无敌5秒!", W/2, H/2-50, "#4af", 24);
        b.y = Math.max(BR, Math.min(H-FH-BR, b.y)); b.vy = 0;
      } else { return gameOver(); }
    }
  }

  function gameOver() {
    G.screen = "over"; G.total += G.score;
    ML.forEach(function(m){ if (G.total >= m && G.unlocks.indexOf(m) === -1) G.unlocks.push(m); });
    G.unlocks.sort(function(a,b){return a-b}); save({ total:G.total, unlocks:G.unlocks });
  }
  function flap() {
    if (G.screen === "menu") return;
    if (G.screen === "over") { G.screen = "menu"; G.menuPage = "main"; return; }
    var ej = G.active.superjump ? G.jump * 1.6 : G.jump;
    G.bird.vy = ej;
    if (G.active.superjump) addFX("🚀", G.bird.x-30, G.bird.y-5, "#f80", 14);
  }

  // ======== 绘制 ========
  function rr(x,y,w,h,r){
    if(r>w/2)r=w/2;if(r>h/2)r=h/2;
    cx.beginPath();cx.moveTo(x+r,y);cx.lineTo(x+w-r,y);
    cx.quadraticCurveTo(x+w,y,x+w,y+r);cx.lineTo(x+w,y+h-r);
    cx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);cx.lineTo(x+r,y+h);
    cx.quadraticCurveTo(x,y+h,x,y+h-r);cx.lineTo(x,y+r);
    cx.quadraticCurveTo(x,y,x+r,y);cx.closePath();
  }
  function btn(x,y,w,h,t,c,hl){
    cx.shadowBlur=8;cx.shadowColor="rgba(0,0,0,.35)";
    cx.fillStyle=c||"#4dc9f6";rr(x,y,w,h,10);cx.fill();
    if(hl){cx.shadowBlur=12;cx.shadowColor="rgba(77,201,246,.4)";}
    cx.shadowBlur=0;cx.fillStyle="#fff";
    cx.font="bold 16px 'Segoe UI',system-ui,sans-serif";
    cx.textAlign="center";cx.textBaseline="middle";cx.fillText(t,x+w/2,y+h/2);
  }

  function drawFX() {
    for (var i = FX.length - 1; i >= 0; i--) {
      var f = FX[i]; f.life--;
      var a = f.life / 60;
      cx.globalAlpha = a;
      cx.fillStyle = f.color;
      cx.font = "bold "+f.size+"px 'Segoe UI',system-ui,sans-serif";
      cx.textAlign = "center"; cx.textBaseline = "middle";
      cx.shadowColor = "rgba(0,0,0,.5)"; cx.shadowBlur = 6;
      cx.fillText(f.text, f.x, f.y - (60 - f.life) * 0.5);
      cx.shadowBlur = 0; cx.globalAlpha = 1;
      if (f.life <= 0) FX.splice(i, 1);
    }
  }

  function drawBird(x,y,r,wg){
    var flash = G.active.invincible && (Math.floor(G.frame / 4) % 2 === 0);
    cx.save(); cx.translate(x,y); cx.rotate(r*Math.PI/180);
    if (G.active.ghost || flash) cx.globalAlpha = 0.4;

    cx.fillStyle="#f5c842";cx.beginPath();cx.ellipse(0,0,16,12,0,0,Math.PI*2);cx.fill();
    cx.fillStyle="#e6a817";cx.beginPath();cx.ellipse(0,4,14,8,0,0,Math.PI*2);cx.fill();
    cx.fillStyle="#e6a817";cx.beginPath();cx.ellipse(-8,2,8,5,-.3,0,Math.PI*2);cx.fill();
    cx.fillStyle="#d4910a";var wy=2+Math.sin(wg*.2)*4;cx.beginPath();cx.ellipse(-10,wy,6,4,-.3,0,Math.PI*2);cx.fill();
    cx.fillStyle="#fff";cx.beginPath();cx.arc(8,-3,6,0,Math.PI*2);cx.fill();
    cx.fillStyle="#222";cx.beginPath();cx.arc(10,-3,3,0,Math.PI*2);cx.fill();
    cx.fillStyle="#fff";cx.beginPath();cx.arc(11,-5,1.2,0,Math.PI*2);cx.fill();
    cx.fillStyle="#e85d1a";cx.beginPath();cx.moveTo(14,0);cx.lineTo(22,2);cx.lineTo(14,5);cx.closePath();cx.fill();
    cx.globalAlpha = 1;

    // 护盾光环（持有护盾时）
    if (G.active.shield && !G.active.invincible) {
      cx.strokeStyle="rgba(68,170,255,"+(0.3+Math.sin(wg*.1)*0.2)+")";
      cx.lineWidth=2;cx.beginPath();cx.arc(0,0,20,0,Math.PI*2);cx.stroke();
      cx.strokeStyle="rgba(68,170,255,"+(0.15+Math.sin(wg*.1+1)*0.1)+")";
      cx.lineWidth=3;cx.beginPath();cx.arc(0,0,24,0,Math.PI*2);cx.stroke();
    }
    // 无敌金色光环
    if (G.active.invincible) {
      var a = 0.3 + Math.sin(wg*.15) * 0.2;
      cx.strokeStyle="rgba(255,215,0,"+a+")";cx.lineWidth=3;
      cx.beginPath();cx.arc(0,0,22,0,Math.PI*2);cx.stroke();
      cx.strokeStyle="rgba(255,215,0,"+(a*0.6)+")";cx.lineWidth=5;
      cx.beginPath();cx.arc(0,0,28,0,Math.PI*2);cx.stroke();
    }
    // 超级跳跃箭头
    if (G.active.superjump && !G.active.invincible) {
      for (var k=0;k<3;k++) {
        var ay=10+k*8+Math.sin(wg*.2+k)*3;
        cx.fillStyle="rgba(255,136,0,"+(0.5-Math.sin(wg*.1+k)*0.3)+")";
        cx.font="10px sans-serif";cx.textAlign="center";cx.textBaseline="middle";
        cx.fillText("▲",0,ay);
      }
    }
    cx.restore();
  }

  function drawSky(){
    var t=THEMES[G.theme],g=cx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,t.a);g.addColorStop(1,t.b);cx.fillStyle=g;cx.fillRect(0,0,W,H);
    if(G.theme!=="night"){
      cx.fillStyle="rgba(255,255,255,.2)";
      [[50,80],[180,50],[320,100]].forEach(function(p){
        cx.beginPath();cx.ellipse(p[0],p[1],42,16,0,0,Math.PI*2);cx.fill();
        cx.beginPath();cx.ellipse(p[0]-24,p[1]+6,30,12,0,0,Math.PI*2);cx.fill();
      });
    } else {
      cx.fillStyle="rgba(255,255,255,.5)";
      for(var i=0;i<50;i++){var sx=(i*31+17)%W,sy=(i*47+11)%(H*.55),sr=.6+i%4*.5;cx.beginPath();cx.arc(sx,sy,sr,0,Math.PI*2);cx.fill();}
    }
  }

  function drawPipes(){
    var t=THEMES[G.theme];
    for(var i=0;i<G.pipes.length;i++){
      var p=G.pipes[i],x=p.x;
      var isMoving=p.moving,isWide=!!p.gapOverride&&!p.moving;
      var body=isMoving?"#c04040":(isWide?"#3a7abf":t.pb);
      var dark=isMoving?"#802020":(isWide?"#1a4a7a":t.pd);
      var light=isMoving?"#e06060":(isWide?"#5a9adf":t.pl);
      var pt=p.moving?p.top:p.top;
      var pb=p.moving?p.bottom:(p.gapOverride?p.top+p.gapOverride:p.top+G.gap);

      // 上管道
      cx.fillStyle=body;cx.fillRect(x,0,PW,pt);
      cx.fillStyle=dark;cx.fillRect(x-5,pt-24,PW+10,24);
      cx.fillStyle=light;cx.fillRect(x+4,pt-20,12,16);
      // 下管道
      cx.fillStyle=body;cx.fillRect(x,pb,PW,H-pb-FH);
      cx.fillStyle=dark;cx.fillRect(x-5,pb,PW+10,24);
      cx.fillStyle=light;cx.fillRect(x+4,pb+4,12,16);

      // 移动管道箭头指示
      if (isMoving) {
        cx.fillStyle="rgba(255,255,255,.4)";
        cx.font="12px sans-serif";cx.textAlign="center";cx.textBaseline="middle";
        if (p.moveSide==='top') cx.fillText("↕",x+PW/2,pt/2);
        else cx.fillText("↕",x+PW/2,(pb+H-FH)/2);
      }
    }
  }

  function drawGnd(sc){
    var t=THEMES[G.theme];cx.fillStyle=t.g;cx.fillRect(0,H-FH,W,FH);
    cx.fillStyle=t.gl;cx.fillRect(0,H-FH,W,5);
    cx.strokeStyle=t.gs;cx.lineWidth=1.5;
    for(var i=-24+sc;i<W;i+=24){cx.beginPath();cx.moveTo(i,H-FH+14);cx.lineTo(i+12,H-FH+14);cx.stroke();}
  }

  // ======== 菜单 ========
  function drawMenu(){
    drawSky();cx.fillStyle="rgba(0,0,0,.45)";cx.fillRect(0,0,W,H);
    cx.textAlign="center";cx.textBaseline="middle";
    cx.shadowColor="rgba(0,0,0,.5)";cx.shadowBlur=12;
    cx.fillStyle="#fff";cx.font="bold 30px 'Segoe UI',system-ui,sans-serif";cx.fillText("Flappy Bird",W/2,42);
    cx.shadowBlur=0;
    var tw=cx.measureText("总积分: "+G.total).width+40;
    cx.fillStyle="rgba(255,255,255,.08)";rr((W-tw)/2,60,tw,26,13);cx.fill();
    cx.fillStyle="#f5c842";cx.font="13px 'Segoe UI',system-ui,sans-serif";cx.fillText("★ 总积分: "+G.total,W/2,73);
    if(G.menuPage==="main")drawM1();else if(G.menuPage==="items")drawM2();else if(G.menuPage==="themes")drawM3();
  }
  function drawM1(){
    cx.textAlign="left";cx.textBaseline="middle";cx.font="bold 13px 'Segoe UI',system-ui,sans-serif";cx.fillStyle="#cde";cx.fillText("■ 难度选择",28,120);
    ["easy","medium","hard"].forEach(function(k,i){var bx=28+i*90;btn(bx,130,80,32,DIFFS[k].label,k===G.diff?"#3a9ae0":"#3a4a6a",k===G.diff);});
    cx.textAlign="left";cx.textBaseline="middle";cx.font="bold 13px 'Segoe UI',system-ui,sans-serif";cx.fillStyle="#cde";cx.fillText("■ 道具 (最多3个)",28,190);
    ITEMS.forEach(function(it,i){
      var col=i%3,row=Math.floor(i/3),bx=28+col*118,by=200+row*34;
      var own=G.unlocks.indexOf(it.cost)!==-1,act=G.selItems.indexOf(it.id)!==-1;
      cx.fillStyle=own?(act?"rgba(77,201,246,.25)":"rgba(255,255,255,.06)"):"rgba(255,255,255,.03)";
      rr(bx,by,110,28,6);cx.fill();
      cx.strokeStyle=own?(act?"#4dc9f6":"#334"):"#222";cx.lineWidth=1;cx.stroke();
      cx.fillStyle=own?(act?"#fff":"#8a8"):"#555";
      cx.font="12px 'Segoe UI',system-ui,sans-serif";cx.textAlign="left";cx.textBaseline="middle";
      cx.fillText((own?(act?"✓ ":"")+it.icon+" ":"🔒 ")+it.name,bx+6,by+14);
      cx.font="9px 'Segoe UI',system-ui,sans-serif";cx.fillStyle=own?"#888":"#444";cx.fillText(it.cost+"分",bx+90,by+14);
    });
    cx.fillStyle="#679";cx.font="11px 'Segoe UI',system-ui,sans-serif";cx.textAlign="left";cx.textBaseline="middle";cx.fillText("点击上方道具进入商店",30,278);
    cx.textAlign="left";cx.textBaseline="middle";cx.font="bold 13px 'Segoe UI',system-ui,sans-serif";cx.fillStyle="#cde";cx.fillText("■ 主题选择",28,310);
    Object.keys(THEMES).forEach(function(k,i){
      var bx=28+i*76,by=320,sel=k===G.theme,t=THEMES[k];
      var gr=cx.createLinearGradient(bx,by,bx,68+32);gr.addColorStop(0,t.a);gr.addColorStop(1,t.b);
      cx.shadowBlur=4;cx.shadowColor="rgba(0,0,0,.2)";cx.fillStyle=gr;rr(bx,by,68,32,6);cx.fill();cx.shadowBlur=0;
      if(sel){cx.strokeStyle="#fff";cx.lineWidth=2;cx.stroke();}
      cx.fillStyle="#fff";cx.font="bold 10px 'Segoe UI',system-ui,sans-serif";cx.textAlign="center";cx.textBaseline="middle";cx.shadowColor="rgba(0,0,0,.4)";cx.shadowBlur=4;cx.fillText(t.name,bx+34,by+16);cx.shadowBlur=0;
    });
    btn(70,385,260,52,"开始游戏","#3a9ae0",true);
    cx.fillStyle="#679";cx.font="11px 'Segoe UI',system-ui,sans-serif";cx.textAlign="center";cx.textBaseline="middle";cx.fillText("点击 / 空格跳跃 · 长按持续上飞",W/2,458);
  }
  function drawM2(){
    cx.textAlign="center";cx.textBaseline="middle";
    cx.fillStyle="#fff";cx.font="bold 20px 'Segoe UI',system-ui,sans-serif";cx.fillText("道具商店",W/2,108);
    var tw=cx.measureText("总积分: "+G.total+" 分").width+32;
    cx.fillStyle="rgba(255,255,255,.08)";rr((W-tw)/2,124,tw,24,12);cx.fill();
    cx.fillStyle="#f5c842";cx.font="12px 'Segoe UI',system-ui,sans-serif";cx.fillText("总积分: "+G.total+" 分",W/2,136);
    ITEMS.forEach(function(it,i){
      var iy=165+i*63;var own=G.unlocks.indexOf(it.cost)!==-1,act=G.selItems.indexOf(it.id)!==-1;
      cx.fillStyle=own?(act?"rgba(77,201,246,.12)":"rgba(255,255,255,.04)"):"rgba(255,255,255,.02)";
      rr(30,iy,340,54,8);cx.fill();
      cx.strokeStyle=own?(act?"#4dc9f6":"#333"):"#222";cx.lineWidth=1;cx.stroke();
      cx.textAlign="left";cx.textBaseline="middle";
      cx.fillStyle=own?"#fff":"#555";cx.font="bold 14px 'Segoe UI',system-ui,sans-serif";cx.fillText(it.name+"  "+it.icon,42,iy+17);
      cx.fillStyle=own?"#9ab":"#444";cx.font="11px 'Segoe UI',system-ui,sans-serif";cx.fillText(it.desc,42,iy+36);
      cx.textAlign="right";
      if(own){cx.fillStyle=act?"#4dc9f6":"#679";cx.font="12px 'Segoe UI',system-ui,sans-serif";cx.fillText(act?"✓ 已装备":"点击装备",360,iy+22);}
      else{var can=G.total>=it.cost;cx.fillStyle=can?"#5c5":"#a55";cx.font="bold 12px 'Segoe UI',system-ui,sans-serif";cx.fillText((can?"购买 ":"需")+it.cost+"分",360,iy+22);}
    });
    btn(100,530,200,36,"返回","#3a4a6a");
    cx.fillStyle="#567";cx.font="10px 'Segoe UI',system-ui,sans-serif";cx.textAlign="center";cx.textBaseline="middle";cx.fillText("点击道具购买或装备/卸下",W/2,518);
  }
  function drawM3(){
    cx.textAlign="center";cx.textBaseline="middle";
    cx.fillStyle="#fff";cx.font="bold 20px 'Segoe UI',system-ui,sans-serif";cx.fillText("选择主题",W/2,108);
    Object.keys(THEMES).forEach(function(k,i){
      var ty=140+i*72;var sel=k===G.theme,t=THEMES[k];
      var gr=cx.createLinearGradient(40,ty,360,ty);gr.addColorStop(0,t.a);gr.addColorStop(1,t.b);
      cx.shadowBlur=6;cx.shadowColor="rgba(0,0,0,.2)";cx.fillStyle=gr;rr(40,ty,320,56,8);cx.fill();cx.shadowBlur=0;
      if(sel){cx.strokeStyle="#fff";cx.lineWidth=2.5;cx.stroke();}
      cx.fillStyle="#fff";cx.font="bold 18px 'Segoe UI',system-ui,sans-serif";cx.textAlign="center";cx.textBaseline="middle";cx.shadowColor="rgba(0,0,0,.5)";cx.shadowBlur=6;cx.fillText(t.name,W/2,ty+28);cx.shadowBlur=0;
      if(sel){cx.fillStyle="rgba(255,255,255,.6)";cx.font="11px 'Segoe UI',system-ui,sans-serif";cx.fillText("使用中",W/2+140,ty+28);}
    });
    btn(100,530,200,36,"返回","#3a4a6a");
  }

  // ======== 游戏画面 ========
  function drawPlay(){
    drawSky();drawPipes();drawGnd(G.frame*2%24);
    drawBird(G.bird.x,G.bird.y,G.bird.rot,G.frame);
    drawFX();

    // 道具状态栏
    var barY = 38;
    var acts = [];
    if (G.active.shield) acts.push("🛡 护盾");
    if (G.active.double) acts.push("×2 双倍");
    if (G.active.ghost) acts.push("👻 幽灵");
    if (G.active.superjump) acts.push("🚀 超跳");
    if (G.active.invincible) acts.push("⭐ 无敌");
    if (G.active.slowmo) {
      acts.push("⏱ 慢动作");
      cx.fillStyle="rgba(50,100,255,.08)";cx.fillRect(0,0,W,H);
      var pct=G.active.slowmoT/300;
      cx.fillStyle="rgba(50,100,255,.2)";cx.fillRect(10,barY+30,120,6);
      cx.fillStyle="#48f";cx.fillRect(10,barY+30,120*pct,6);
    }
    if (G.active.invincible) {
      cx.fillStyle="rgba(255,215,0,.06)";cx.fillRect(0,0,W,H);
      var pct=G.active.invincibleT/300;
      cx.fillStyle="rgba(255,215,0,.2)";cx.fillRect(140,barY+30,120,6);
      cx.fillStyle="#fd0";cx.fillRect(140,barY+30,120*pct,6);
    }
    if (acts.length) {
      cx.font="13px 'Segoe UI',system-ui,sans-serif";cx.textAlign="left";cx.textBaseline="middle";
      cx.fillStyle="rgba(0,0,0,.3)";cx.fillRect(6,barY-2,260,28);
      cx.fillStyle="#fff";cx.fillText(acts.join("  "),12,barY+12);
    }
    // 分数
    cx.fillStyle="#fff";cx.font="bold 32px 'Segoe UI',system-ui,sans-serif";
    cx.textAlign="center";cx.textBaseline="top";cx.shadowColor="rgba(0,0,0,.3)";cx.shadowBlur=6;
    cx.fillText(G.score,W/2,10);cx.shadowBlur=0;
  }

  function drawOver(){
    drawPlay();cx.fillStyle="rgba(0,0,0,.55)";cx.fillRect(0,0,W,H);
    cx.shadowBlur=20;cx.shadowColor="rgba(0,0,0,.5)";
    cx.fillStyle="rgba(10,20,40,.85)";rr(W/2-120,130,240,260,12);cx.fill();cx.shadowBlur=0;
    cx.strokeStyle="rgba(255,255,255,.1)";cx.lineWidth=1;cx.stroke();
    cx.textAlign="center";cx.textBaseline="middle";
    cx.fillStyle="#fff";cx.font="bold 24px 'Segoe UI',system-ui,sans-serif";cx.fillText("游戏结束",W/2,160);
    cx.fillStyle="#f5c842";cx.font="20px 'Segoe UI',system-ui,sans-serif";cx.fillText(G.score,W/2,200);
    cx.fillStyle="#889";cx.font="12px 'Segoe UI',system-ui,sans-serif";cx.fillText("本局得分",W/2,220);
    cx.fillStyle="#eef";cx.font="14px 'Segoe UI',system-ui,sans-serif";cx.fillText("累积: "+G.total+" 分",W/2,250);
    if(G.unlocks.length){var last=G.unlocks[G.unlocks.length-1];var item=ITEMS.find(function(it){return it.cost===last});if(item){cx.fillStyle="rgba(77,201,246,.15)";rr(W/2-90,270,180,36,18);cx.fill();cx.fillStyle="#4dc9f6";cx.font="bold 13px 'Segoe UI',system-ui,sans-serif";cx.fillText("解锁: "+item.name+" "+item.icon,W/2,288);}}
    var nxt=null;ML.forEach(function(m){if(G.unlocks.indexOf(m)===-1&&!nxt)nxt=m;});if(nxt){cx.fillStyle="#778";cx.font="11px 'Segoe UI',system-ui,sans-serif";cx.fillText("下个道具需 "+nxt+" 分",W/2,345);}
    cx.fillStyle="#fff";cx.font="14px 'Segoe UI',system-ui,sans-serif";cx.fillText("点击 / 空格重新开始",W/2,530);
  }
  function draw(){if(G.screen==="menu")drawMenu();else if(G.screen==="play")drawPlay();else if(G.screen==="over")drawOver();}
  function loop(){ update(); draw(); requestAnimationFrame(loop); }

  // ======== 菜单交互 ========
  function onMenu(x,y){
    if(G.menuPage==="main"){
      ["easy","medium","hard"].forEach(function(k,i){var bx=28+i*90;if(x>=bx&&x<=bx+80&&y>=130&&y<=162)G.diff=k;});
      if(x>=28&&x<=370&&y>=190&&y<=275){G.menuPage="items";return;}
      Object.keys(THEMES).forEach(function(k,i){var bx=28+i*76;if(x>=bx&&x<=bx+68&&y>=320&&y<=352)G.theme=k;});
      if(x>=70&&x<=330&&y>=385&&y<=437){G.screen="play";resetGame();}
    }else if(G.menuPage==="items"){
      ITEMS.forEach(function(it,i){var iy=165+i*63;if(x>=30&&x<=370&&y>=iy-2&&y<=iy+56){var own=G.unlocks.indexOf(it.cost)!==-1;if(own){var idx=G.selItems.indexOf(it.id);if(idx===-1){if(G.selItems.length<3)G.selItems.push(it.id);}else G.selItems.splice(idx,1);}else if(G.total>=it.cost){G.total-=it.cost;G.unlocks.push(it.cost);G.unlocks.sort(function(a,b){return a-b});if(G.selItems.length<3)G.selItems.push(it.id);save({total:G.total,unlocks:G.unlocks});}}});
      if(x>=100&&x<=300&&y>=530&&y<=566)G.menuPage="main";
    }else if(G.menuPage==="themes"){
      Object.keys(THEMES).forEach(function(k,i){var ty=140+i*72;if(x>=40&&x<=360&&y>=ty-2&&y<=ty+58)G.theme=k;});
      if(x>=100&&x<=300&&y>=530&&y<=566)G.menuPage="main";
    }
  }
  function pos(e){var r=c.getBoundingClientRect();return{x:(e.clientX-r.left)*W/r.width,y:(e.clientY-r.top)*H/r.height};}
  c.addEventListener("click",function(e){var p=pos(e);if(G.screen==="menu"){onMenu(p.x,p.y);return;}flap();});
  c.addEventListener("touchstart",function(e){e.preventDefault();if(G.screen==="menu"){var t=e.touches[0],r=c.getBoundingClientRect();onMenu((t.clientX-r.left)*W/r.width,(t.clientY-r.top)*H/r.height);return;}G.held=true;},{passive:false});
  c.addEventListener("touchend",function(e){e.preventDefault();G.held=false;if(G.screen!=="menu")flap();},{passive:false});
  document.addEventListener("keydown",function(e){if(e.key===" "||e.key==="Spacebar"){e.preventDefault();G.held=true;if(G.screen!=="menu")flap();}});
  document.addEventListener("keyup",function(e){if(e.key===" "||e.key==="Spacebar"){e.preventDefault();G.held=false;}});
  init();loop();
})();
</script>
</body>
